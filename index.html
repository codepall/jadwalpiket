<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Piket Salam Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617; --bg-gradient: linear-gradient(135deg, #020617, #0f172a, #1e3a8a);
            --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --accent-blue: #3b82f6; --accent-glow: rgba(59, 130, 246, 0.4);
            --text-main: #f8fafc; --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; background: var(--bg-gradient); background-attachment: fixed; font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-main); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; position: relative; overflow-x: hidden; }
        body::before, body::after { content: ""; position: absolute; border-radius: 50%; filter: blur(100px); z-index: -1; }
        body::before { width: 400px; height: 400px; background: rgba(59, 130, 246, 0.15); top: -100px; left: -100px; }
        body::after { width: 300px; height: 300px; background: rgba(14, 165, 233, 0.15); bottom: -50px; right: -50px; }
        .container { background: var(--glass-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 40px; width: 100%; max-width: 480px; box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1); text-align: center; position: relative; }
        h1 { font-size: 1.75rem; margin-bottom: 8px; font-weight: 800; letter-spacing: -0.5px; }
        .status-badge { display: inline-block; background: rgba(59, 130, 246, 0.1); color: #60a5fa; padding: 8px 16px; border-radius: 30px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; border: 1px solid rgba(59, 130, 246, 0.2); box-shadow: 0 0 20px var(--accent-glow); }
        .date-display { font-size: 1.15rem; color: var(--text-muted); margin-bottom: 30px; font-weight: 500; }
        .piket-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
        .piket-item { background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); padding: 18px; border-radius: 16px; font-weight: 700; font-size: 1.1rem; border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; gap: 4px; }
        .piket-item:hover { transform: translateY(-3px); background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)); border-color: rgba(59, 130, 246, 0.3); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .class-badge { font-size: 0.85rem; color: #94a3b8; font-weight: 500; text-transform: uppercase; }
        .footer-link { margin-top: 35px; display: inline-block; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        .footer-link:hover { color: var(--accent-blue); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Jadwal Piket Salam</h1>
        <div id="statusBadge" class="status-badge">Memuat Data...</div>
        <div id="dateDisplay" class="date-display">Tunggu sebentar</div>
        <ul class="piket-list" id="piketList"></ul>
        <a href="/login.html" class="footer-link">Login Administrator &rarr;</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD6qO-GfQupUahS-vWmORIMMJAIconbuow",
            authDomain: "jadwalpiket-cd023.firebaseapp.com",
            projectId: "jadwalpiket-cd023",
            storageBucket: "jadwalpiket-cd023.firebasestorage.app",
            messagingSenderId: "1046765391875",
            appId: "1:1046765391875:web:81569f60292879260dbe36",
            measurementId: "G-TH3XFWJ03N"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let jadwalSiklus = [
            [{nama: "Naufal", kelas: "9H"}, {nama: "Maya", kelas: "8G"}, {nama: "Daud", kelas: "8E"}],
            [{nama: "Pancasona", kelas: "8F"}, {nama: "Zefanya", kelas: "8E"}, {nama: "Cindy", kelas: "9A"}],
            [{nama: "Lionel", kelas: "8E"}, {nama: "Sarah", kelas: "9G"}, {nama: "Exel", kelas: "8G"}],
            [{nama: "Bagas", kelas: "9H"}, {nama: "Zahra", kelas: "8H"}, {nama: "Renita", kelas: "8I"}],
            [{nama: "Shyailla", kelas: "8E"}, {nama: "Kireina", kelas: "9C"}, {nama: "Felicia", kelas: "9I"}],
            [{nama: "Alhena", kelas: "8F"}, {nama: "Assyifa", kelas: "9I"}, {nama: "Agata", kelas: "8D"}],
            [{nama: "Ikhmal", kelas: "9H"}, {nama: "Nathania", kelas: "8E"}, {nama: "Angelina", kelas: "9G"}],
            [{nama: "Atma", kelas: "8F"}, {nama: "Meilda", kelas: "9E"}, {nama: "Thalita", kelas: "9G"}],
            [{nama: "Cesario", kelas: "8E"}, {nama: "Sheren", kelas: "9H"}, {nama: "Aulia", kelas: "9G"}],
            [{nama: "Azzam", kelas: "8G"}, {nama: "Anindhita", kelas: "9F"}, {nama: "Syafa", kelas: "9G"}]
        ];

        let hariLiburSpesifik = [];
        let tanggalMulaiSiklus = '2026-07-20'; 
        let liburDefault = [0]; 

        function getLocalYYYYMMDD(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function isHariLibur(date) {
            return liburDefault.includes(date.getDay()) || hariLiburSpesifik.includes(getLocalYYYYMMDD(date));
        }

        Promise.all([
            db.collection("pengaturan").doc("sistem").get(),
            db.collection("hari_libur").get(),
            db.collection("jadwal").doc("data").get()
        ]).then(([pengaturanDoc, liburSnapshot, jadwalDoc]) => {
            if (pengaturanDoc.exists) {
                const data = pengaturanDoc.data();
                if (data.tanggalMulai) tanggalMulaiSiklus = data.tanggalMulai;
                if (data.hariLiburDefault) liburDefault = data.hariLiburDefault;
            }
            liburSnapshot.forEach(doc => hariLiburSpesifik.push(doc.id));
            
            // LOGIKA PEMBACAAN DATA JADWAL YANG BENAR
            if (jadwalDoc.exists && jadwalDoc.data().siklus) {
                const dataSiklus = jadwalDoc.data().siklus;
                if (typeof dataSiklus === 'string') {
                    jadwalSiklus = JSON.parse(dataSiklus);
                }
            }
            renderJadwal();
        });

        function hitungHariEfektif(targetDate) {
            const startDate = new Date(tanggalMulaiSiklus);
            startDate.setHours(0,0,0,0);
            targetDate.setHours(0,0,0,0);
            
            let current = new Date(startDate);
            let indexJadwal = 0;

            while (current <= targetDate) {
                if (!liburDefault.includes(current.getDay())) {
                    indexJadwal++; 
                }
                current.setDate(current.getDate() + 1);
            }
            return (indexJadwal - 1) % (jadwalSiklus.length || 10);
        }

        function renderJadwal() {
            const now = new Date();
            let targetDate = new Date(now);
            let badgeText = 'Jadwal Hari Ini';

            if (now.getHours() >= 8) {
                let tomorrow = new Date(now);
                tomorrow.setDate(now.getDate() + 1);
                
                let checkDate = new Date(tomorrow);
                let holidayCount = 0;
                
                while (isHariLibur(checkDate)) {
                    holidayCount++;
                    checkDate.setDate(checkDate.getDate() + 1);
                }
                
                if (holidayCount <= 2) {
                    targetDate = checkDate;
                    badgeText = holidayCount === 0 ? 'Jadwal Besok' : 'Jadwal Selanjutnya';
                } else {
                    targetDate = tomorrow;
                    badgeText = 'Jadwal Besok';
                }
            }

            const opsiTanggal = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Jakarta' };
            document.getElementById('statusBadge').innerText = badgeText;
            document.getElementById('dateDisplay').innerText = targetDate.toLocaleDateString('id-ID', opsiTanggal);

            const piketList = document.getElementById('piketList');
            piketList.innerHTML = '';

            if (liburDefault.includes(targetDate.getDay())) {
                piketList.innerHTML = '<li class="piket-item" style="color: #60a5fa; text-align: center; border-color: rgba(59,130,246,0.3);">Tidak Ada Jadwal<br><span class="class-badge" style="color: #60a5fa;">Hari Libur Rutin</span></li>';
                return;
            }

            if (hariLiburSpesifik.includes(getLocalYYYYMMDD(targetDate))) {
                piketList.innerHTML = '<li class="piket-item" style="color: #34d399; text-align: center; border-color: rgba(52,211,153,0.3);">Bonus Libur!<br><span class="class-badge" style="color: #6ee7b7;">Jadwal hari ini ditiadakan</span></li>';
                return;
            }

            if (jadwalSiklus.length === 0) {
                piketList.innerHTML = '<li class="piket-item" style="text-align: center;">Jadwal belum diatur admin</li>';
                return;
            }

            const indexHariIni = hitungHariEfektif(targetDate);
            if(indexHariIni < 0) {
                piketList.innerHTML = '<li class="piket-item" style="text-align: center;">Siklus jadwal belum dimulai</li>';
                return;
            }

            const siswaHariIni = jadwalSiklus[indexHariIni];
            if (!siswaHariIni || siswaHariIni.length === 0) {
                piketList.innerHTML = '<li class="piket-item" style="text-align: center; color: #94a3b8;">Kosong (Tidak ada siswa di hari ini)</li>';
                return;
            }

            siswaHariIni.forEach(siswa => {
                const li = document.createElement('li');
                li.className = 'piket-item';
                li.innerHTML = `${siswa.nama} <span class="class-badge">Kelas ${siswa.kelas.toUpperCase()}</span>`;
                piketList.appendChild(li);
            });
        }
    </script>
</body>
</html>
